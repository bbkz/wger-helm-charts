{{- if .Values.redis.enabled }}
{{- if .Values.redis.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
    helm.sh/hook: pre-install,pre-upgrade,pre-rollback
    helm.sh/hook-weight: "-5"
stringData:
  redis-password: {{ include "wger.secretValue" (dict "ctx" $ "name" "redis" "key" "redis-password" "value" .Values.redis.auth.password "length" 25) | quote }}
{{- end }}
{{- end }}
