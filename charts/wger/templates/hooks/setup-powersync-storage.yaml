# post-install hook: initialize the powersync storage schema/user in the DB
# by running `./manage.py setup-powersync-storage` in its own pod, using the
# same image and environment as the wger app container. Only needs database
# access — no ServiceAccount/RBAC.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-setup-powersync-storage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    {{- include "wger.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-setup-powersync-storage
    spec:
      restartPolicy: Never
      {{- with .Values.app.global.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: setup-powersync-storage
          image: {{ include "wger.image" . | quote }}
          imagePullPolicy: {{ .Values.app.global.image.PullPolicy }}
          command: ["./manage.py", "setup-powersync-storage"]
          env:
            {{- include "wger.env" . | indent 12 }}
            {{- include "database.settings" . | indent 10 }}
            {{- include "powersync.settings" . | indent 10 }}
            {{- include "wger.env.secrets" . | indent 10 }}
      initContainers:
        # wait for postgres, redis and a ready wger app pod — the app service
        # only gets endpoints once the django migrations have run
        - name: init-container
          image: {{ .Values.app.global.initImage }}
          imagePullPolicy: {{ .Values.app.global.image.PullPolicy }}
          command:
          {{- include "initContainer.app.command" . | indent 10 }}
