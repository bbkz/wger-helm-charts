    helm.sh/chart: wger-1.0.0
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: golden-keygen
      containers:
        - name: keygen
          image: docker.io/alpine:3.22
          command:
            - sh
            - -c
            - |
              # Add required packages
              apk add jose python3 kubectl
              
              # Create jwk keys
              # https://github.com/wger-project/wger/blob/master/wger/core/management/commands/generate-jwt-keys.py
              # https://datatracker.ietf.org/doc/html/rfc7519
              jose jwk gen -i '{"alg":"RS256", "kid":"wger"}' -o /tmp/jwt.key
              jose jwk pub -i /tmp/jwt.key > /tmp/jwt.pub
              
              # python for json dump string conversion and urlsafe base64 conversion (padding)
              PRIVATEKEY=$(python -c "import json; from base64 import urlsafe_b64encode; print(urlsafe_b64encode(json.dumps($(cat /tmp/jwt.key)).encode()).decode())")
              PUBLICKEY=$(python -c "import json; from base64 import urlsafe_b64encode; print(urlsafe_b64encode(json.dumps($(cat /tmp/jwt.pub)).encode()).decode())")

              # Create temp yaml
              yaml_tmp='
              apiVersion: v1
              kind: Secret
              metadata:
                name: golden-jwt
                namespace: golden-ns
              stringData:
                private-key: "NEW_PRIVATEKEY"
                public-key: "NEW_PUBLICKEY"
              '

              # Add keys to the yaml
              yaml=$(echo "$yaml_tmp" | sed 's/"NEW_PRIVATEKEY"/'$PRIVATEKEY'/g' | sed 's/"NEW_PUBLICKEY"/'$PUBLICKEY'/g')
              # Update or create the secret, this requires a serviceaccount with permissions
              echo "$yaml" | kubectl apply -f -
---
# Source: wger/templates/hooks/setup-powersync-storage.yaml
# post-install hook: initialize the powersync storage schema/user in the DB
# by running `./manage.py setup-powersync-storage` in its own pod, using the
# same image and environment as the wger app container. Only needs database
# access — no ServiceAccount/RBAC.
apiVersion: batch/v1
kind: Job
metadata:
  name: golden-setup-powersync-storage
  namespace: golden-ns
  labels:
    app.kubernetes.io/name: golden
    app.kubernetes.io/instance: golden
    app.kubernetes.io/version: "2.6"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: wger-1.0.0
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golden-setup-powersync-storage
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 1000
      containers:
        - name: setup-powersync-storage
          image: "docker.io/wger/server:2.6"
          imagePullPolicy: IfNotPresent
          command: ["./manage.py", "setup-powersync-storage"]
          env:            
            # get default env
            # get list of custom defined env
            # get default env list without custom ones (override)
            # merge default env with values env
            # ouput list of dict
            - name: TZ
              value: "UTC"
            - name: TIME_ZONE
              value: "UTC"
            - name: ENABLE_EMAIL
              value: "False"
            - name: DJANGO_PERFORM_MIGRATIONS
              value: "True"
            - name: DJANGO_DB_ENGINE
              value: "django.db.backends.postgresql"
            - name: DJANGO_CACHE_BACKEND
              value: "django_redis.cache.RedisCache"
            - name: DJANGO_CACHE_LOCATION
              value: "redis://golden-redis:6379/1"
            - name: DJANGO_CACHE_CLIENT_CLASS
              value: "django_redis.client.DefaultClient"
            - name: DJANGO_CACHE_TIMEOUT
              value: "1296000"
            - name: EXERCISE_CACHE_TTL
              value: "2419200"
            - name: CSRF_TRUSTED_ORIGINS
              value: "http://127.0.0.1,https://127.0.0.1,http://localhost,https://localhost"
            - name: DJANGO_DEBUG
              value: "False"
            - name: DJANGO_MEDIA_ROOT
              value: "/home/wger/media"
            - name: NUMBER_OF_PROXIES
              value: "1"
            - name: AXES_ENABLED
              value: "False"
            - name: AXES_LOCKOUT_PARAMETERS
              value: "ip_address"
            - name: AXES_FAILURE_LIMIT
              value: "10"
            - name: AXES_COOLOFF_TIME
              value: "30"
            - name: AXES_IPWARE_PROXY_COUNT
              value: "1"
            - name: AXES_IPWARE_META_PRECEDENCE_ORDER
              value: "HTTP_X_FORWARDED_FOR,REMOTE_ADDR"
            - name: AXES_HANDLER
              value: "axes.handlers.cache.AxesCacheHandler"
            - name: ACCESS_TOKEN_LIFETIME
              value: "10"
            - name: REFRESH_TOKEN_LIFETIME
              value: "24"
            - name: WGER_USE_GUNICORN
              value: "True"
            - name: GUNICORN_CMD_ARGS
              value: "--timeout 240 --workers 4 --worker-class gthread --threads 3 --forwarded-allow-ips * --proxy-protocol True --access-logformat='%(h)s %(l)s %({client-ip}i)s %(l)s %({x-real-ip}i)s %(l)s %({x-forwarded-for}i)s %(l)s %(t)s \"%(r)s\" %(s)s %(b)s \"%(f)s\" \"%(a)s\"' --access-logfile - --error-logfile -"
            - name: MIN_ACCOUNT_AGE_TO_TRUST
              value: "21"
            - name: ALLOW_REGISTRATION
              value: "False"
            - name: ALLOW_GUEST_USERS
              value: "False"
            - name: WGER_INSTANCE
              value: "https://wger.de"
            - name: ALLOW_UPLOAD_VIDEOS
              value: "True"
            - name: SYNC_EXERCISES_ON_STARTUP
              value: "False"
            - name: DOWNLOAD_EXERCISE_IMAGES_ON_STARTUP
              value: "False"
            - name: USE_CELERY
              value: "True"
            - name: SYNC_EXERCISES_CELERY
              value: "true"
            - name: SYNC_EXERCISE_IMAGES_CELERY
              value: "true"
            - name: SYNC_EXERCISE_VIDEOS_CELERY
              value: "true"
            - name: DOWNLOAD_INGREDIENTS_FROM
              value: "WGER"
            - name: CELERY_WORKER_CONCURRENCY
              value: "4"
            - name: CACHE_API_EXERCISES_CELERY
              value: "true"
            - name: CACHE_API_EXERCISES_CELERY_FORCE_UPDATE
              value: "true"          
            - name: DJANGO_DB_HOST
              value: "golden-postgres"
            - name: DJANGO_DB_PORT
              value: "5432"
            - name: DJANGO_DB_USER
              valueFrom:
                secretKeyRef:
                  name:  golden-postgres
                  key: "USERDB_USER"
            - name: DJANGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: golden-postgres
                  key: "USERDB_PASSWORD"
            - name: DJANGO_DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: golden-postgres
                  key: "POSTGRES_DB"          
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: "golden-jwt"
                  key: "private-key"
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: "golden-jwt"
                  key: "public-key"
            # This is the path (inside the container) to the YAML config file
            # Alternatively the config path can be specified in the command
            # e.g:
            #   command: ['start', '-r', 'unified', '-c', '/config/powersync.yaml']
            #
            # The config file can also be specified in Base 64 encoding
            # e.g.: Via an environment variable
            #   POWERSYNC_CONFIG_B64: [base64 encoded content]
            # or e.g.: Via a command line parameter
            #    command: ['start', '-r', 'unified', '-c64', '[base64 encoded content]']
            - name: POWERSYNC_CONFIG_PATH
              value: "/config/powersync.yaml"
            # Sync rules can be specified as base 64 encoded YAML
            # e.g: Via an environment variable
            # POWERSYNC_SYNC_RULES_B64: "[base64 encoded sync rules]"
            # or e.g.: Via a command line parameter
            #     command: ['start', '-r', 'unified', '-sync64', '[base64 encoded content]']
            - name: PS_JWKS_URL
              value: "http://golden-http:80/api/v2/powersync-keys"
            - name: PS_PORT
              value: "8080"
            - name: POWERSYNC_URL_PATH
              value: "ps"
            # ps database settings
            - name: PS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: "golden-powersync"
                  key: "user"
            - name: PS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "golden-powersync"
                  key: "pw"
            - name: PS_STORAGE_PG_URI
              value: "postgres://$(PS_DB_USER):$(PS_DB_PASSWORD)@$(DJANGO_DB_HOST):$(DJANGO_DB_PORT)/$(DJANGO_DB_DATABASE)"
            - name: PS_DATABASE_URI
              value: "postgres://$(DJANGO_DB_USER):$(DJANGO_DB_PASSWORD)@$(DJANGO_DB_HOST):$(DJANGO_DB_PORT)/$(DJANGO_DB_DATABASE)"          
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: "golden-django"
                  key: "secret-key"
            - name: CELERY_BROKER
              value: "redis://golden-redis:6379/2"
            - name: CELERY_BACKEND
              value: "redis://golden-redis:6379/2"
      initContainers:
        # wait for postgres, redis and a ready wger app pod — the app service
        # only gets endpoints once the django migrations have run
        - name: init-container
          image: docker.io/busybox:1.37
          imagePullPolicy: IfNotPresent
          command:          
          - /bin/sh
          - -c
          # sleep 35; wait for terminationGracePeriodSeconds of the wger-app container
          # this prevents using the wger-app container which are in the process of termination
          # @todo find a better solution to prevent starting powersync
          # on upgrades before the new wger-app container is ready
          # -> this may be only relevant when upgrading from a "non" powersync setup
          - sleep 35; until nc -zvw10 "golden-postgres" "5432"; do echo "Waiting for postgres service ("golden-postgres":"5432") "; sleep 2; done &&
            until nc -zvw10 golden-redis 6379; do echo "Waiting for redis service (golden-redis:6379)"; sleep 2; done &&
            until nc -zvw10 golden-app "8000"; do echo "Waiting for wger app service (golden-app:"8000")"; sleep 2; done
