apiVersion: apps/v1
kind: Deployment
metadata:
  name: golden-powersync
  namespace: golden-ns
  labels:
    app.kubernetes.io/name: golden
    app.kubernetes.io/instance: golden
    app.kubernetes.io/version: "2.6"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: wger-1.0.0
spec:
  replicas: 1
  strategy:
    # kills all old Pods first
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: golden-powersync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golden-powersync
      annotations:        
        checksum/secrets: 0fde0e9c2f37419a1d051d2943583cd5335a2a9953f324bc002a033d7bce7c08
        # restart when the mounted powersync config changes
        checksum/config: b221a56fcd54c90cb20c95572d055a759f0535f9ca43f1984aeabd76a57f4b05
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: powersync
          image: "docker.io/journeyapps/powersync-service:latest"
          imagePullPolicy: IfNotPresent
          env:          
            - name: DJANGO_DB_HOST
              value: "golden-postgres"
            - name: DJANGO_DB_PORT
              value: "5432"
            - name: DJANGO_DB_USER
              valueFrom:
                secretKeyRef:
                  name:  golden-postgres
                  key: "USERDB_USER"
            - name: DJANGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: golden-postgres
                  key: "USERDB_PASSWORD"
            - name: DJANGO_DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: golden-postgres
                  key: "POSTGRES_DB"          
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: "golden-jwt"
                  key: "private-key"
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: "golden-jwt"
                  key: "public-key"
            # This is the path (inside the container) to the YAML config file
            # Alternatively the config path can be specified in the command
            # e.g:
            #   command: ['start', '-r', 'unified', '-c', '/config/powersync.yaml']
            #
            # The config file can also be specified in Base 64 encoding
            # e.g.: Via an environment variable
            #   POWERSYNC_CONFIG_B64: [base64 encoded content]
            # or e.g.: Via a command line parameter
            #    command: ['start', '-r', 'unified', '-c64', '[base64 encoded content]']
            - name: POWERSYNC_CONFIG_PATH
              value: "/config/powersync.yaml"
            # Sync rules can be specified as base 64 encoded YAML
            # e.g: Via an environment variable
            # POWERSYNC_SYNC_RULES_B64: "[base64 encoded sync rules]"
            # or e.g.: Via a command line parameter
            #     command: ['start', '-r', 'unified', '-sync64', '[base64 encoded content]']
            - name: PS_JWKS_URL
              value: "http://golden-http:80/api/v2/powersync-keys"
            - name: PS_PORT
              value: "8080"
            - name: POWERSYNC_URL_PATH
              value: "ps"
            # ps database settings
            - name: PS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: "golden-powersync"
                  key: "user"
            - name: PS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "golden-powersync"
                  key: "pw"
            - name: PS_STORAGE_PG_URI
              value: "postgres://$(PS_DB_USER):$(PS_DB_PASSWORD)@$(DJANGO_DB_HOST):$(DJANGO_DB_PORT)/$(DJANGO_DB_DATABASE)"
            - name: PS_DATABASE_URI
              value: "postgres://$(DJANGO_DB_USER):$(DJANGO_DB_PASSWORD)@$(DJANGO_DB_HOST):$(DJANGO_DB_PORT)/$(DJANGO_DB_DATABASE)"
          #
          # In Kubernetes commands overrides the entrypoint and args adds additional arguments to the entrypoint (command)
          # so in this comment "command" is ment do be "args"
          #
          # The unified service runs an API server and replication worker in the same container.
          # These services can be executed in different containers by using individual entry commands e.g.
          # Start only the API server with
          #   command: ['start', '-r', 'api']
          # Start only the replication worker with
          #   command: ['start', '-r', 'sync']

          # Migrations occur automatically by default. Default migrations can be disabled in `powersync.yaml`:
          #  migrations:
          #   disable_auto_migration: true
          #
          # Service migrations can be manually triggered by starting a container with the
          # following command:
          #     command: ['migrate', 'up']
          # Note that this container must finish executing before starting the sync or unified container.
          args: ["start", "-r", "unified"]
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: prometheus
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: powersync-conf
              mountPath: /config
      initContainers:
        - name: init-container
          image: docker.io/busybox:1.37
          imagePullPolicy: IfNotPresent
          command:          
          - /bin/sh
          - -c
          # sleep 35; wait for terminationGracePeriodSeconds of the wger-app container
          # this prevents using the wger-app container which are in the process of termination
          # @todo find a better solution to prevent starting powersync
          # on upgrades before the new wger-app container is ready
          # -> this may be only relevant when upgrading from a "non" powersync setup
          - sleep 35; until nc -zvw10 "golden-postgres" "5432"; do echo "Waiting for postgres service ("golden-postgres":"5432") "; sleep 2; done &&
            until nc -zvw10 golden-redis 6379; do echo "Waiting for redis service (golden-redis:6379)"; sleep 2; done &&
            until nc -zvw10 golden-app "8000"; do echo "Waiting for wger app service (golden-app:"8000")"; sleep 2; done
      volumes:
        - name: powersync-conf
          configMap:
            name: golden-powersync-configmap
