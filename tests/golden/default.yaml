# Source: wger/charts/postgres/templates/scripts.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: golden-postgres-scripts
  labels:
    helm.sh/chart: postgres-1.3.11
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: golden
    app.kubernetes.io/version: "15.18"
    app.kubernetes.io/managed-by: Helm
data:
  01-init-userdb.sh: |
    #!/bin/sh
    create_user()
    {
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" -v USERDBNAME="$POSTGRES_DB" -v USERDBUSER="$USERDB_USER" -v USERDBPASSWORD="$USERDB_PASSWORD" <<-EOSQL
      CREATE USER :"USERDBUSER" WITH PASSWORD :'USERDBPASSWORD';
      GRANT ALL PRIVILEGES ON DATABASE :"USERDBNAME" TO :"USERDBUSER";
      ALTER DATABASE :"USERDBNAME" OWNER TO :"USERDBUSER";
    EOSQL
    }
    set -e
    if [ ! -z "$POSTGRES_DB" ] && [ ! -z "$USERDB_USER" ] && [ ! -z "$USERDB_PASSWORD" ]; then
      create_user
    fi
  init.sh: |
    #!/bin/sh
    echo "Start initialization"
    echo "Copy init-userdb script"
    cp /initscripts/01-init-userdb.sh /scripts
    if [ -d /extrascripts ]; then
      echo "Copy extra scripts"
      cp /extrascripts/* /scripts
    fi
    if [ -d /customscripts ]; then
      echo "Copy custom scripts"
      cp /customscripts/* /scripts
    fi
    if [ -d /customconfig ]; then
      echo "Create postgres config"
      cat /customconfig/* >>/configs/postgresql.conf
    fi
    if [ -d /extraconfigs ]; then
      echo "Add extra configs to postgres config"
      cat /extraconfigs/* >>/configs/postgresql.conf
    fi
    echo "Initialization done."
---
# Source: wger/charts/redis/templates/scripts.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: golden-redis-scripts
  labels:
    helm.sh/chart: redis-2.4.0
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: golden
    app.kubernetes.io/version: "8.8.0"
    app.kubernetes.io/managed-by: Helm
data:
  init.sh: |
    #!/bin/sh
    REDIS_CONFIG=/data/conf/redis.conf
    SENTINEL_CONFIG=/data/conf/sentinel.conf
    # Clean up old init logs or print them
    cleanup_log() {
      rm -f /data/init.log
      if [ -f "/data/init.log" ]; then
        echo "Detected restart of this instance ($HOSTNAME)"
        echo "## This was the previous log:"
        cat /data/init.log
        echo "## End of previous log"
      fi
    }

    # Log a message during initialization phase
    # $1 - the log message
    log() {
      echo "$(date) $1"
      echo "$(date) $1" >>/data/init.log
    }

    # Creating redis base configuration
    configure_redis_base() {
      log "Creating redis base configuration"
      mkdir -p /data/conf
      rm -f $REDIS_CONFIG

      log "Setting redis server defaults"
      echo "port 6379" >>$REDIS_CONFIG
      echo "protected-mode no" >>$REDIS_CONFIG
      echo "bind 0.0.0.0" >>$REDIS_CONFIG
      echo "dir /data" >>$REDIS_CONFIG
      THISIP="$(getent hosts $HOSTNAME | awk '{ print $1 }')"
      echo "replica-announce-ip ${THISIP}" >>$REDIS_CONFIG
      log "Finished creating base configuration"
    }

    configure_redis_ext() {
      log "Setting extended redis configuration"
      if [ -f /usr/local/etc/redis/redis.conf ]; then
          log "Adding optional redis configuration"
          cat /usr/local/etc/redis/redis.conf >>$REDIS_CONFIG
      fi
      if [ -d /extraredisconfigs ]; then
        log "Adding extra redis configs to redis configuration"
        cat /extraredisconfigs/* >>$REDIS_CONFIG
      fi
    }

    test_master_alive() {
      TEST="$(timeout 2s redis-cli -h $MASTER -p 6379 $REDISUSER $REDISPWD ping)"
      if [ -z "$TEST" ]; then
        log "Master is not alive"
        return 1
      fi
      log "Master is alive"
      return 0
    }

    test_valid_dns() {
      KNOWN_HOSTS="$(getent hosts golden-redis-headless.golden-ns.svc.cluster.local | awk '{ print $1 }')"
      log "## Known hosts for headless service golden-redis-headless.golden-ns.svc.cluster.local:"
      for AHOSTIP in $KNOWN_HOSTS; do
        AHOSTNAME=$(getent hosts $AHOSTIP | awk '{print $2}')
        log "${AHOSTIP} ${AHOSTNAME}"
      done
      log "#####"
      MASTERENTRY="$(getent hosts $MASTER | awk '{ print $1 }')"
    }

    configure_sentinel() {
      log "Configuring sentinel server..."
      if [ -z "$MASTER" ]; then
        MASTER="$(getent hosts $HOSTNAME | awk '{ print $1 }')"
        log "No master found - Configuring sentinel for master $HOSTNAME with address $MASTER"
        echo "sentinel monitor redisha $MASTER 6379 2" >>$SENTINEL_CONFIG
      else
        log "Redis master was found - Configuring sentinel for master address $MASTER"
        echo "sentinel monitor redisha $MASTER 6379 2" >>$SENTINEL_CONFIG
      fi
      echo "sentinel down-after-milliseconds redisha 30000" >>$SENTINEL_CONFIG
      echo "sentinel failover-timeout redisha 180000" >>$SENTINEL_CONFIG
    }

    configure_sentinel_ext() {
      log "Setting extended sentinel configuration"
      if [ -f /usr/local/etc/redis/sentinel.conf ]; then
          log "Adding optional sentinel configuration settings"
          cat /usr/local/etc/redis/sentinel.conf >>$SENTINEL_CONFIG
      fi
      if [ -d /extrasentinelconfigs ]; then
        log "Adding extra sentinel configs to sentinel configuration"
        cat /extrasentinelconfigs/* >>$SENTINEL_CONFIG
      fi
      log "Configuring sentinel server finished."
    }

    configure_redis_cluster() {
      log "Determining authentication parameters"
      if [ -f $REDIS_CONFIG ]; then
        REDISUSER=$(cat $REDIS_CONFIG | grep masteruser | awk '{ print $2 }')
        if [ -n "$REDISUSER" ]; then
          REDISUSER="--user $REDISUSER"
        fi
        REDISPWD=$(cat $REDIS_CONFIG | grep masterauth | awk '{ print $2 }')
        if [ -n "$REDISPWD" ]; then
          REDISPWD="--pass $REDISPWD"
        fi
      fi
      if [ -f $SENTINEL_CONFIG ]; then
        SENTINELUSER=$(cat $SENTINEL_CONFIG | grep "sentinel sentinel-user" | awk '{ print $3 }')
        if [ -n "$SENTINELUSER" ]; then
          SENTINELUSER="--user $SENTINELUSER"
        fi
        SENTINELPWD=$(cat $SENTINEL_CONFIG | grep "sentinel sentinel-pass" | awk '{ print $3 }')
        if [ -n "$SENTINELPWD" ]; then
          SENTINELPWD="--pass $SENTINELPWD"
        fi
      fi
      log "Try to resolve cluster service.."
      SERVICE="$(getent hosts golden-redis)"
      if [ -z "$SERVICE" ]; then
        log "Can't resolve service - Will restart after DNS failure wait"
        sleep 15
        log "Restart"
        exit 1
      else
        log "Service resolved: ${SERVICE}"
      fi
      log "Try to detect cluster master.."
      MASTER="$(timeout 2s redis-cli -h golden-redis -p 26379 $SENTINELUSER $SENTINELPWD sentinel get-master-addr-by-name redisha | head -n 1)"
      if [ -z "$MASTER" ]; then
        log "No master found - This instance ($HOSTNAME) will be master now"
      else
        log "Redis master was found with address $MASTER - Checking host dns entry"
        test_valid_dns
        if [ -z "$MASTERENTRY" ]; then
          log "No valid DNS entry found!"
          if [ -f "/data/failover_restart" ]; then
            rm /data/failover_restart
            log "Forcing failover now"
            redis-cli -h golden-redis -p 26379 $SENTINELUSER $SENTINELPWD sentinel failover redisha
          else
            log "Waiting for failover before restart"
            sleep 35
            touch /data/failover_restart
          fi
          log "Restart"
          exit 1
        else
          MASTER=$MASTERENTRY
          log "$MASTER has valid DNS entry"
          log "Checking if master is alive"
          if ! test_master_alive; then
            if [ -f "/data/failover_restart" ]; then
              rm /data/failover_restart
              log "Master is still dead! - forcing failover and retry pod initialization"
              redis-cli -h golden-redis -p 26379 $SENTINELUSER $SENTINELPWD sentinel failover redisha
            else
              log "Dead master at address $MASTER detected! - waiting for failover"
              sleep 35
              touch /data/failover_restart
            fi
            log "Restart"
            exit 1
          else
            rm -f /data/failover_restart
            log "Setting this instance ($HOSTNAME) as replicaof $MASTER"
            echo "replicaof $MASTER 6379" >>$REDIS_CONFIG
          fi
        fi
      fi
    }

    log "Creating configuration..."
    mkdir -p /data/conf
    cleanup_log
    rm -f $REDIS_CONFIG
    configure_redis_base
    configure_redis_ext
    log "Done."
---
# Source: wger/templates/configmap-nginx.yaml
kind: ConfigMap
apiVersion: v1
metadata:
  name: golden-nginx-configmap
data:
  wger-app.conf: |
    upstream app_server {
      # fail_timeout=0 means we always retry an upstream even if it failed
      # to return a good HTTP response <- according to gunicorn doc
      server golden-app.golden-ns.svc.cluster.local:8000 fail_timeout=0;
      zone upstreams 64K;
      keepalive 2;
    }
    # Used by the /ps/ proxy below.
    upstream powersync {
        server golden-powersync-api.golden-ns.svc.cluster.local:8080;
    }

    # JSON access log format compatible with the Loki/Alloy parser
    # (same field names as the Caddy parser, so the same dashboard works).
    log_format json_access escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"client_ip":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"request_proto":"$server_protocol",'
            '"request_host":"$host",'
            '"status":$status,'
            '"size":$body_bytes_sent,'
            '"duration":$request_time,'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer"'
        '}';
    
    # Universal X-Forwarded-Proto handling for all deployment scenarios
    # - Uses upstream value when behind reverse proxy (Traefik, Caddy, etc.)
    # - Falls back to nginx's scheme for direct connections and port forwarding
    map $http_x_forwarded_proto $final_forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # webserver
    server {
      listen 80;

      # set the correct host(s) for your site
      server_name fit.example.com;

      access_log /dev/stdout json_access;

      location / {
        proxy_pass http://app_server;

        # Standard proxy headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $final_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;
        proxy_http_version 1.1;

        # Timeouts for WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
      }

      # Reverse proxy for the PowerSync service, used by the mobile app for offline mode
      location /ps/ {
        proxy_pass http://powersync/;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $final_forwarded_proto;

        # WebSocket upgrade (used by the diagnostics app and the Web SDK)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Sync streams are long-lived (HTTP/2 streaming POST) and must not
        # be buffered or cut off by short timeouts.
        proxy_buffering off;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
      }

      location /static/ {
        alias /wger/static/;

        # Files in the static folder are preprocessed by collectstatic and have a hash
        # in their names, so we can cache longer
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
      }

      location /media/ {
        alias /wger/media/;
      }

      # Increase max body size to allow for video uploads
      client_max_body_size 100M;
    }
