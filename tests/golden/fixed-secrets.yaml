# Pins every value that would otherwise be randAlphaNum-generated, so the
# golden renders are deterministic. Applied to all profiles (first -f, so
# profile files can still override).
app:
  django:
    secret:
      key: "golden-django-secret-key"
  mail:
    secret:
      password: "golden-mail-password"
powersync:
  secretDatabase:
    pw: "golden-powersync-pw"
redis:
  auth:
    password: "golden-redis-password"
celery:
  flower:
    secret:
      password: "golden-flower-password"
